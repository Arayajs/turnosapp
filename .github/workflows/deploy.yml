name: TurnOS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_WEBAPP_NAME: turnosapp-arayajs

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build + Unit Tests (all branches/PRs)
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore TurnOS.sln

      - name: Build (Release)
        run: dotnet build TurnOS.sln --configuration Release --no-restore

      - name: Run unit tests
        run: >
          dotnet test TurnOS.sln
          --configuration Release
          --no-build
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

  # ─────────────────────────────────────────────
  # Job 2: Publish + Deploy (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish src/TurnOS.API/TurnOS.API.csproj
          --configuration Release
          --output ./publish

      - name: Deploy via Kudu ZipDeploy
        run: |
          cd ./publish
          zip -r ../webapp.zip .
          curl -X POST \
            "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy" \
            --user "${{ secrets.KUDU_USER }}:${{ secrets.KUDU_PWD }}" \
            --data-binary @../webapp.zip \
            -H "Content-Type: application/zip" \
            --max-time 300 \
            -f \
            -w "HTTP %{http_code}\n"
